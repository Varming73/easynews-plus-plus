name: 'PR Validation'

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize

# Minimal permissions. This workflow runs in the privileged pull_request_target
# context, so it deliberately does NOT check out or execute any PR code — it only
# validates PR metadata (the title). Code-dependent checks (build, tests,
# typecheck, formatting) run in test.yml under the unprivileged pull_request
# trigger against the PR's own commit.
permissions:
  pull-requests: read
  contents: read

jobs:
  validate-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
